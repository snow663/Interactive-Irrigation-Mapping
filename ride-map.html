<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ride Map" />
    <title>Ride Level Map</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="./src/style.css" />
    <style>
      body.ride-level-body { overflow: hidden; }
      .ride-level-shell { position: fixed; inset: 0; display: grid; grid-template-columns: minmax(280px, 360px) 1fr; background: #020617; color: #e5e7eb; }
      #rideLevelMap { width: 100%; height: 100%; min-height: 100vh; }
      .ride-menu { z-index: 1000; border-right: 1px solid rgba(148,163,184,.22); background: rgba(15,23,42,.96); padding: 14px; overflow: auto; box-shadow: 0 10px 40px rgba(0,0,0,.35); }
      .ride-menu h1 { margin: 0 0 4px; font-size: 1.25rem; }
      .ride-menu p { margin: 0 0 12px; color: #94a3b8; font-size: .9rem; }
      .ride-menu-actions, .ride-map-actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
      .ride-card-list { display: grid; gap: 8px; margin: 12px 0; }
      .ride-card { width: 100%; text-align: left; border: 1px solid rgba(148,163,184,.28); border-radius: 14px; padding: 10px; background: rgba(30,41,59,.82); color: #e5e7eb; cursor: pointer; }
      .ride-card.active { border-color: var(--ride-color, #facc15); box-shadow: 0 0 0 2px color-mix(in srgb, var(--ride-color, #facc15) 35%, transparent); }
      .ride-card strong { display: block; font-size: 1rem; }
      .ride-card span { display: block; color: #cbd5e1; font-size: .82rem; margin-top: 3px; }
      .ride-color-dot { width: 14px; height: 14px; display: inline-block; border-radius: 999px; background: var(--ride-color, #06b6d4); margin-right: 6px; vertical-align: -2px; }
      .ride-map-stage { position: relative; min-width: 0; }
      .ride-hud { position: absolute; z-index: 900; left: 16px; right: 16px; bottom: 16px; display: grid; gap: 8px; pointer-events: none; }
      .ride-hud-card { pointer-events: auto; max-width: 720px; border: 1px solid rgba(148,163,184,.28); border-radius: 16px; background: rgba(15,23,42,.92); color: #e5e7eb; padding: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.4); }
      .ride-hud-card h2 { margin: 0 0 4px; font-size: 1.1rem; }
      .ride-stats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
      .ride-stats span { border: 1px solid rgba(148,163,184,.22); border-radius: 999px; padding: 5px 8px; background: rgba(30,41,59,.75); font-size: .82rem; }
      .ride-map-actions { margin-top: 8px; }
      .menu-toggle { display: none; position: absolute; z-index: 1100; top: 12px; left: 12px; }
      .ride-marker-label { background: rgba(15,23,42,.9); border: 1px solid rgba(250,204,21,.8); color: #f8fafc; padding: 2px 6px; border-radius: 999px; font-size: 12px; }
      @media (max-width: 820px) {
        .ride-level-shell { grid-template-columns: 1fr; }
        .ride-menu { position: absolute; inset: 0 auto 0 0; width: min(88vw, 360px); transform: translateX(-104%); transition: transform .2s ease; }
        .ride-menu.open { transform: translateX(0); }
        .menu-toggle { display: inline-flex; }
        .ride-hud { left: 10px; right: 10px; bottom: 10px; }
      }
    </style>
  </head>
  <body class="ride-level-body">
    <main class="ride-level-shell">
      <button id="rideMenuToggle" class="ghost menu-toggle" type="button">Rides</button>
      <aside id="rideMenu" class="ride-menu" aria-label="Ride select menu">
        <h1>Ride Select</h1>
        <p>Select one ride map. Only that ride’s boundary, tracks, markers, and logs are shown.</p>
        <div class="ride-menu-actions">
          <button id="reloadRideDataBtn" type="button">Reload definitions</button>
          <a class="ghost link-button" href="./index.html">Old field map</a>
          <a class="ghost link-button" href="./admin-v2.html">Admin V2</a>
        </div>
        <div id="rideCards" class="ride-card-list"></div>
      </aside>

      <section class="ride-map-stage">
        <div id="rideLevelMap" aria-label="Selected ride level map"></div>
        <div class="ride-hud">
          <section class="ride-hud-card">
            <h2 id="rideTitle">No ride selected</h2>
            <div id="rideSubtitle">Load definitions, then select a ride.</div>
            <div id="rideStats" class="ride-stats"></div>
            <div class="ride-map-actions">
              <button id="gpsRideBtn" class="primary" type="button">Use My Location</button>
              <button id="followRideBtn" type="button">Follow: On</button>
              <button id="fitRideBtn" type="button">Fit Ride</button>
              <button id="clearLiveTrackBtn" class="danger" type="button">Clear Live Track</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="./src/user-session.js"></script>
    <script type="module" src="./src/ride-map.js"></script>
  </body>
</html>
